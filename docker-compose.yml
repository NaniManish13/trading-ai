version: '3.8'

services:
  trading-ai:
    build: .
    container_name: trading-ai-platform
    ports:
      - "8501:8501"  # Streamlit
      - "8000:8000"  # FastAPI
    volumes:
      - ./:/app
      - ./logs:/app/logs
      - ./database:/app/database
    environment:
      - PYTHONUNBUFFERED=1
      - STREAMLIT_SERVER_HEADLESS=true
    env_file:
      - .env
    command: streamlit run dashboard/app.py --server.port=8501 --server.address=0.0.0.0

